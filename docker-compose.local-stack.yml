version: '3.8'

# SupAgentic Local Stack — Spin up multiple AI tools together
# Usage: docker compose -f docker-compose.local-stack.yml up -d

services:
  # ═══ Local LLM ═══
  ollama:
    image: ollama/ollama:latest
    container_name: sup-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ═══ Model Serving ═══
  vllm:
    image: vllm/vllm-openai:latest
    container_name: sup-vllm
    ports:
      - "8000:8000"
    volumes:
      - vllm-models:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - MODEL_NAME=meta-llama/Llama-3.1-8B-Instruct
    command: --model ${MODEL_NAME:-meta-llama/Llama-3.1-8B-Instruct} --host 0.0.0.0
    profiles: [gpu]

  # ═══ RAG ═══
  ragflow:
    image: infiniflow/ragflow:latest
    container_name: sup-ragflow
    ports:
      - "9380:9380"
    volumes:
      - ragflow-data:/ragflow/data
    restart: unless-stopped

  # ═══ Agents ═══
  dify:
    image: langgenius/dify-web:latest
    container_name: sup-dify
    ports:
      - "3100:3000"
    environment:
      - CONSOLE_API_URL=http://localhost:5001
    restart: unless-stopped

  langflow:
    image: langflowai/langflow:latest
    container_name: sup-langflow
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_AUTO_LOGIN=true
    restart: unless-stopped

  # ═══ Media ═══
  comfyui:
    image: comfyanonymous/comfyui:latest
    container_name: sup-comfyui
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/comfyui/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: [gpu]
    restart: unless-stopped

  # ═══ Dashboard ═══
  dashboard:
    image: python:3.12-slim
    container_name: sup-dashboard
    ports:
      - "8899:8899"
    volumes:
      - ./:/app
    working_dir: /app
    command: python -m http.server 8899
    restart: unless-stopped

volumes:
  ollama-data:
  vllm-models:
  ragflow-data:
  comfyui-models:
