name: Health Check

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run health check
        run: python supagentic.py health

      - name: Verify tool count
        run: |
          COUNT=$(python -c "from supagentic import TOOLS; print(len(TOOLS))")
          echo "Total tools: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "::warning::Tool count below 50: $COUNT"
          fi

      - name: List tools
        run: python supagentic.py list
